<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<!-- Живой первый кадр игры для обложки-заглушки: инитит игру в песочнице
     (sandbox без allow-same-origin, как настоящий плеер), даёт ей стартовать
     и замирает на раннем кадре. Родитель (карточка) не может прочитать пиксели
     песочницы, поэтому «первый кадр» показывает сам этот iframe. -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; connect-src 'self' https://safjqsofdrxdmvnfgvjf.supabase.co; frame-src https://vgametikok.github.io https://safjqsofdrxdmvnfgvjf.supabase.co; img-src https: data:; style-src 'self' 'unsafe-inline'; base-uri 'none'; object-src 'none'">
<style>
  html,body{margin:0;width:100%;height:100%;overflow:hidden;background:transparent}
  /* Игра сама рисуется в свой размер; iframe заполняет обложку, клики не ловит. */
  #g{position:absolute;inset:0;width:100%;height:100%;border:0;display:block;pointer-events:none;background:transparent}
</style>
</head>
<body>
<script>
'use strict';
(function () {
  var SUPABASE_URL = 'https://safjqsofdrxdmvnfgvjf.supabase.co';
  var SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNhZmpxc29mZHJ4ZG12bmZndmpmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4Nzk2NDgsImV4cCI6MjA5NjQ1NTY0OH0.gcZ452loXUS0fmApZLr7PqvIYYZ8TqxIX2plgLNnoDo';
  var GAMES_BASE = 'https://vgametikok.github.io/sharky_play/';
  var ALLOWED = ['https://vgametikok.github.io', SUPABASE_URL];

  var params = new URLSearchParams(location.search);
  var id = params.get('id') || '';
  if (!/^[a-z0-9-]+$/i.test(id)) return; // тихо: покажется градиент карточки

  function resolve(src) {
    var url = /^https?:\/\//.test(src || '') ? src : GAMES_BASE + String(src || '').replace(/^\/+/, '');
    try { if (ALLOWED.indexOf(new URL(url).origin) === -1) return null; } catch (e) { return null; }
    return url;
  }
  var isStorage = function (url) { try { return new URL(url).origin === SUPABASE_URL; } catch (e) { return false; } };

  // Свежий кадр по версии игры (как в основном плеере) — не из HTTP-кеша.
  fetch(SUPABASE_URL + '/rest/v1/games?id=eq.' + encodeURIComponent(id) + '&status=eq.published&select=src,version,accent,bg,score_label', {
    headers: { apikey: SUPABASE_ANON, Authorization: 'Bearer ' + SUPABASE_ANON },
  }).then(function (r) { return r.ok ? r.json() : []; }).then(function (rows) {
    var g = rows && rows[0];
    if (!g) return;
    var url = resolve(g.src);
    if (!url) return;
    url += (url.indexOf('?') >= 0 ? '&' : '?') + 'v=' + (g.version || 1);

    var f = document.createElement('iframe');
    f.id = 'g';
    f.setAttribute('sandbox', 'allow-scripts');
    f.setAttribute('scrolling', 'no');
    f.setAttribute('tabindex', '-1');
    f.setAttribute('aria-hidden', 'true');

    var started = false, frozen = false;
    function post(m) { try { f.contentWindow && f.contentWindow.postMessage(m, '*'); } catch (e) {} }
    function drive() {
      if (started) return; started = true;
      post({ type: 'init', accent: g.accent, bg: g.bg, scoreLabel: g.score_label });
      post({ type: 'start' });
      // Замереть на раннем кадре: движковые игры по pause останавливают цикл
      // (игры не на нашем движке pause могут игнорировать — тогда кадр живой).
      setTimeout(function () { if (!frozen) { frozen = true; post({ type: 'pause' }); } }, 700);
    }
    // Игра сообщает готовность — тогда инитим; плюс страховочный таймер.
    window.addEventListener('message', function (e) {
      if (e.source !== f.contentWindow) return;
      var d = e.data || {};
      if (d.type === 'ready') drive();
    });
    f.addEventListener('load', function () { setTimeout(drive, 400); }); // если ready не пришёл

    if (isStorage(url)) {
      fetch(url).then(function (r) { if (!r.ok) throw 0; return r.text(); })
        .then(function (html) { f.srcdoc = html; }).catch(function () {});
    } else {
      f.src = url;
    }
    document.body.appendChild(f);
  }).catch(function () {});
})();
</script>
</body>
</html>
